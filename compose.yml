services:
  mysql:
    image: mysql:8.0
    container_name: citas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: citas
      MYSQL_USER: citas
      MYSQL_PASSWORD: citas
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: citas-backend
    restart: unless-stopped
    depends_on:
      - mysql
    expose:
      - 8000
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: citas
      DB_USERNAME: citas
      DB_PASSWORD: citas
      # Cache y sesión en local (sin MySQL en cada request)
      CACHE_STORE: file
      SESSION_DRIVER: cookie
      # API para React: CORS y Sanctum SPA (origen del frontend vía nginx)
      FRONTEND_URL: http://localhost:8080
      SANCTUM_STATEFUL_DOMAINS: "localhost:8080"
    volumes:
      - ./backend:/var/www
      # vendor en volumen propio: I/O rápido (evita lentitud del bind mount en Windows)
      - backend_vendor:/var/www/vendor

  frontend:
    build:
      context: ./frontend
    container_name: citas-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    container_name: citas-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  db_data:
  backend_vendor:
