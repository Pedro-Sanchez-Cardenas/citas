services:
  mysql:
    image: mysql:8.0
    container_name: citas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: citas
      MYSQL_USER: citas
      MYSQL_PASSWORD: citas
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: citas-backend
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: citas
      DB_USERNAME: citas
      DB_PASSWORD: citas
    volumes:
      - ./backend:/var/www

  frontend:
    build:
      context: ./frontend
    container_name: citas-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:

